# .github/workflows/release.yml
name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*' # Triggers whenever cargo release pushes a version tag like v0.2.0

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission to allow creating releases

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Extract Changelog Section
        id: extract_changelog
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}" # Strips 'v' to get '0.2.0'
          
          echo "Extracting release notes for version $VERSION..."
          
          # 1. Look for the line number containing our target version substring safely
          START_LINE=$(grep -n "## \[$VERSION\]" CHANGELOG.md | head -n 1 | cut -d: -f1)
          
          if [ -z "$START_LINE" ]; then
            echo "::error::Could not find CHANGELOG.md section matching: ## [$VERSION]"
            exit 1
          fi
          
          # 2. Extract every line below that header line
          TAIL_CONTENTS=$(tail -n +$((START_LINE + 1)) CHANGELOG.md)
          
          # 3. Stream downwards until hitting the next Markdown version block header (##)
          NOTES=""
          while IFS= read -r line; do
            # Stop matching if we hit a different version header, but ignore empty lines/subheadings
            if [[ "$line" =~ ^##\ \[ ]]; then
              break
            fi
            NOTES+="$line"$'\n'
          done <<< "$TAIL_CONTENTS"
          
          # 4. Safely pipe the multiline string block out to GitHub Actions
          {
            echo "markdown<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"