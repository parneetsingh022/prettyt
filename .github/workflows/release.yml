# .github/workflows/release.yml
name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*' # Triggers whenever cargo release pushes a version tag like v0.2.0

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission to allow creating releases

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Extract Changelog Section
        id: extract_changelog
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}" # Strips 'v' to get '0.2.0'
          
          echo "Extracting release notes for version $VERSION..."
          
          # 1. Find the line number where our version section starts
          START_LINE=$(grep -n "^## \[$VERSION\]" CHANGELOG.md | cut -d: -f1)
          
          if [ -z "$START_LINE" ]; then
            echo "Could not find changelog section for version $VERSION"
            exit 1
          fi
          
          # 2. Get all contents starting from our version header
          TAIL_CONTENTS=$(tail -n +$((START_LINE + 1)) CHANGELOG.md)
          
          # 3. Read downwards line-by-line until hitting the next major header (##)
          NOTES=""
          while IFS= read -r line; do
            if [[ "$line" =~ ^##\  ]]; then
              break
            fi
            NOTES+="$line"$'\n'
          done <<< "$TAIL_CONTENTS"
          
          # Safely export multiline strings into the GitHub Actions pipeline runner
          {
            echo "markdown<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"